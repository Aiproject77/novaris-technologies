<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novaris Solution — Questionnaire client</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@1,600;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Charte de couleur Novaris Solution — identique au dashboard */
  --brand:#6C3FC5;--brand-dark:#5530A3;--brand-bg:rgba(108,63,197,0.06);--brand-bg2:rgba(108,63,197,0.12);
  --navy:#0F172A;--navy2:#1E293B;
  --bg:#F8FAFC;--surface:#fff;--surface2:#F8FAFC;
  --t1:#0F172A;--t2:#334155;--t3:#64748B;--t4:#94A3B8;
  --border:#E2E8F0;--border2:#CBD5E1;
  --radius:12px;--shadow:0 1px 4px rgba(0,0,0,0.06);
  --tr:0.15s ease;
}

#rail{position:fixed;top:0;left:0;right:0;height:3px;background:var(--border);z-index:300}
#fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand-dark));border-radius:0 2px 2px 0;transition:width .4s cubic-bezier(.4,0,.2,1)}

nav{position:sticky;top:3px;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:200}
.nav-in{max-width:620px;margin:0 auto;padding:0 18px;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-icon{width:34px;height:34px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{color:#fff;width:17px;height:17px}
.logo-text{font-family:'Lora',serif;font-style:italic;font-size:.9rem;font-weight:700;color:var(--navy);line-height:1.2}
.logo-text span{display:block;font-size:.62rem;font-weight:500;color:var(--t3);font-family:'Inter',sans-serif;font-style:normal}
.nav-r{display:flex;align-items:center;gap:10px}
.step-lbl{font-size:.75rem;font-weight:600;color:var(--t3);font-family:'Inter',sans-serif}
.step-lbl b{color:var(--brand)}
.btn-rsec{font-size:.72rem;font-weight:500;color:var(--t3);background:none;border:1px solid var(--border);padding:4px 10px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:color var(--tr),border-color var(--tr);font-family:'Inter',sans-serif}
.btn-rsec:hover{color:var(--t1);border-color:var(--border2)}
.btn-rsec svg{width:11px;height:11px}

body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t1);font-size:15px;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Lora',serif;font-style:italic}
.wrap{max-width:580px;margin:0 auto;padding:32px 18px 80px}

.step{display:none}
.step.on{display:block;animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.sec-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:.68rem;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-family:'Inter',sans-serif}
.sec-eyebrow::after{content:'';display:inline-block;width:32px;height:1px;background:rgba(108,63,197,.4)}
.qt{font-size:1.25rem;font-weight:700;font-style:italic;color:var(--navy);margin-bottom:5px;line-height:1.3;letter-spacing:-.3px}
.qh{font-size:.83rem;color:var(--t3);margin-bottom:20px;line-height:1.6;font-family:'Inter',sans-serif;font-style:normal}

.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:background var(--tr),border-color var(--tr);user-select:none}
.opt:hover{background:var(--brand-bg);border-color:var(--brand)}
.opt.sel{background:var(--brand-bg);border-color:var(--brand)}
.ind{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background var(--tr),border-color var(--tr);background:var(--surface)}
.opt.sel .ind{background:var(--brand);border-color:var(--brand)}
.ck{display:none;color:#fff}
.opt.sel .ck{display:block}
.cb{border-radius:4px}
.opt-tx{font-size:.85rem;font-weight:500;color:var(--t2);line-height:1.4;flex:1}
.opt.sel .opt-tx{color:var(--brand-dark);font-weight:600}

.field{margin-bottom:13px}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--navy);margin-bottom:5px}
.req{color:var(--brand)}
.fld{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:.85rem;color:var(--t1);background:var(--surface);outline:none;transition:border-color var(--tr),box-shadow var(--tr)}
.fld:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(108,63,197,.1)}
.fld::placeholder{color:var(--t4)}
select.fld{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='11' height='7' viewBox='0 0 11 7' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5.5 6L10 1' stroke='%2364748B' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 11px center;padding-right:32px}
textarea.fld{resize:vertical;min-height:88px;line-height:1.6}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.char-cnt{font-size:.68rem;color:var(--t4);text-align:right;margin-top:3px}

.imp{border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.imp-row{display:grid;grid-template-columns:1fr 140px;gap:10px;align-items:center;padding:9px 13px;border-bottom:1px solid var(--border);background:var(--surface)}
.imp-row:last-child{border-bottom:none}
.imp-row:nth-child(even){background:var(--surface2)}
.imp-lbl{font-size:.82rem;color:var(--t1)}
.imp-sel{font-size:.75rem;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--t1);font-family:'Inter',sans-serif;cursor:pointer;outline:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='9' height='6' viewBox='0 0 9 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4.5 5L8 1' stroke='%2364748B' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 7px center;padding-right:22px;width:100%}
.imp-sel:focus{border-color:var(--brand)}

.range-wrap{margin-top:6px}
.range-row{display:flex;align-items:center;gap:14px}
.range-row input[type=range]{flex:1;accent-color:var(--brand);height:5px;cursor:pointer;-webkit-appearance:none;appearance:none;background:linear-gradient(to right,var(--brand) 0%,var(--brand) 50%,var(--border) 50%,var(--border) 100%);border-radius:3px}
.range-val{font-size:.9rem;font-weight:700;color:var(--brand);min-width:110px;text-align:right;font-family:'Lora',serif;font-style:italic}

.btns{display:flex;gap:8px;margin-top:22px;align-items:center}
.btn-next{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--brand);color:#fff;border:none;padding:11px 28px;border-radius:8px;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;flex:1;box-shadow:0 4px 14px rgba(108,63,197,.25);transition:background var(--tr),transform var(--tr);min-height:46px}
.btn-next:hover{background:var(--brand-dark);transform:translateY(-1px)}
.btn-next:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-back{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--surface);color:var(--t2);border:1.5px solid var(--border);padding:11px 20px;border-radius:8px;font-family:'Inter',sans-serif;font-size:.83rem;font-weight:600;cursor:pointer;min-height:46px;transition:background var(--tr),border-color var(--tr)}
.btn-back:hover{background:var(--bg);border-color:var(--border2)}
.btn-back:disabled{opacity:.3;cursor:not-allowed}

.dots{display:flex;gap:4px;justify-content:center;margin-top:16px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s}
.dot.on{background:var(--brand);width:18px;border-radius:3px}
.dot.done{background:rgba(108,63,197,.4)}

.em{display:none;align-items:center;gap:6px;font-size:.78rem;color:#B91C1C;background:#FEF2F2;border:1px solid #FECACA;padding:9px 13px;border-radius:7px;margin-top:10px}
.em.vis{display:flex}
.em svg{width:14px;height:14px;flex-shrink:0}

.ty{display:none;text-align:center;padding:56px 0}
.ty.vis{display:block}
.ty-icon{width:66px;height:66px;background:var(--brand-bg2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.ty-icon svg{color:var(--brand)}
.ty h2{font-size:1.5rem;color:var(--navy);margin-bottom:10px}
.ty > p{font-size:.87rem;color:var(--t2);max-width:380px;margin:0 auto;line-height:1.75;font-family:'Inter',sans-serif;font-style:normal}
.btn-restart{display:inline-flex;align-items:center;gap:6px;margin-top:22px;background:transparent;border:1.5px solid var(--brand);color:var(--brand);padding:9px 22px;border-radius:8px;font-family:'Inter',sans-serif;font-size:.83rem;font-weight:700;cursor:pointer;transition:background var(--tr)}
.btn-restart:hover{background:var(--brand-bg)}

.loading-wrap{text-align:center;padding:80px 0;color:var(--t3);font-size:.85rem}

@media(max-width:520px){
  .g2{grid-template-columns:1fr}
  .imp-row{grid-template-columns:1fr;gap:4px}
  .imp-sel{width:100%}
  .btns{flex-direction:column}
  .btn-next,.btn-back{width:100%}
}
</style>
</head>
<body>

<script>
const SUPABASE_URL = 'https://aoeonvhohwgcjnvswlbt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_259KgrJGFJIQnN4edkYGhw_e4gdyqq2';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>

<!-- RAIL -->
<div id="rail"><div id="fill" style="width:0%"></div></div>

<!-- NAV -->
<nav>
  <div class="nav-in">
    <div class="logo">
      <div class="logo-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <div class="logo-text">Novaris Solution<span>Questionnaire client</span></div>
    </div>
    <div class="nav-r">
      <span class="step-lbl"><b id="cur-n">1</b> / <span id="tot-n">—</span></span>
      <button class="btn-rsec" onclick="resetStep()" title="Réinitialiser cette section">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Reset
      </button>
    </div>
  </div>
</nav>

<!-- CONTENT -->
<div class="wrap">
  <div class="loading-wrap" id="loading">Chargement du questionnaire…</div>
  <div id="steps-container"></div>

  <!-- SUCCESS -->
  <div class="ty" id="ty">
    <div class="ty-icon"><svg width="30" height="30" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg></div>
    <h2>Merci !</h2>
    <p>Votre questionnaire a été soumis. Patrick l'étudiera et vous enverra une proposition personnalisée dans les <strong>24 heures</strong>.</p>
    <button class="btn-restart" onclick="restart()">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      Recommencer
    </button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// SURVEY DYNAMIQUE — piloté par la table `survey_config`,
// éditable depuis l'onglet "Survey" du dashboard Novaris.
// ══════════════════════════════════════════════════════════

const KNOWN_COLUMNS = new Set([
  'business_name','contact_name','email','phone','city','years_in_business','team_size',
  'current_mrr','revenue_target','revenue_target_display','has_website',
  'feat_chatbot','feat_quote','feat_portal','feat_payment','feat_automation','feat_seo','feat_booking','feat_live_chat',
  'timeline','budget','assets','biggest_challenge','additional_notes',
  'lead_source','manual_task','primary_goal','phased','quote_method','response_time'
]);

let STEPS = [];
let TOTAL = 0;
let cur = 0;
let S = { status:'new' };

async function loadSurvey(){
  const { data, error } = await sb.from('survey_config').select('*').eq('active', true).order('step_number').order('sort_order');
  if(error || !data || !data.length){
    document.getElementById('loading').textContent = "Le questionnaire n'est pas disponible pour le moment. Merci de réessayer plus tard.";
    return;
  }
  const grouped = {};
  data.forEach(f=>{ (grouped[f.step_number] = grouped[f.step_number]||[]).push(f); });
  STEPS = Object.keys(grouped).map(Number).sort((a,b)=>a-b).map(sn=>grouped[sn]);
  TOTAL = STEPS.length;
  document.getElementById('tot-n').textContent = TOTAL;
  renderSteps();
  document.getElementById('loading').style.display = 'none';
  go(0, true);
}

function fieldTemplate(f){
  const req = f.required ? ' <span class="req">*</span>' : '';
  switch(f.field_type){
    case 'text':
    case 'textarea': {
      const isArea = f.field_type==='textarea';
      const tag = isArea
        ? `<textarea class="fld" id="f-${f.field_key}" maxlength="500" placeholder="${f.placeholder_fr||''}" oninput="S['${f.field_key}']=this.value;updCount('${f.field_key}')"></textarea>`
        : `<input class="fld" id="f-${f.field_key}" type="text" placeholder="${f.placeholder_fr||''}" oninput="S['${f.field_key}']=this.value">`;
      return `<div class="field"><label>${f.question_fr}${req}</label>${tag}${isArea?`<div class="char-cnt"><span id="cnt-${f.field_key}">0</span>/500</div>`:''}</div>`;
    }
    case 'select': {
      const opts = (f.options||[]).map(o=>`<option value="${o.value}">${o.label_fr}</option>`).join('');
      return `<div class="field"><label>${f.question_fr}${req}</label><select class="fld" id="f-${f.field_key}" onchange="S['${f.field_key}']=this.value"><option value="">Sélectionner…</option>${opts}</select></div>`;
    }
    case 'radio':
    case 'checkbox': {
      const type = f.field_type;
      const opts = (f.options||[]).map(o=>`
        <div class="opt" data-v="${o.value}" onclick="pickOpt(this,'${f.field_key}','${type}')">
          <input type="${type==='radio'?'radio':'checkbox'}"><div class="ind"><svg class="ck" width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3" fill="white"/></svg></div>
          <span class="opt-tx">${o.label_fr}</span>
        </div>`).join('');
      return `<div class="field"><label>${f.question_fr}${req}</label><div class="opts">${opts}</div></div>`;
    }
    case 'importance': {
      const opts = (f.options && f.options.length) ? f.options : [
        {value:'Must have',label_fr:'Essentiel'},{value:'Nice to have',label_fr:'Souhaitable'},{value:'Not needed',label_fr:'Non requis'}
      ];
      const selOpts = opts.map(o=>`<option value="${o.value}">${o.label_fr}</option>`).join('');
      return `<div class="imp-row"><div class="imp-lbl">${f.question_fr}</div><select class="imp-sel" id="f-${f.field_key}" onchange="S['${f.field_key}']=this.value"><option value="">—</option>${selOpts}</select></div>`;
    }
    case 'range': {
      const min = f.min_val??0, max = f.max_val??100, step = f.step_val??1, suf = f.suffix||'';
      const mid = Math.round((min+max)/2);
      return `<div class="field">
        <label>${f.question_fr}${req}</label>
        <div class="range-wrap">
          <div class="range-row">
            <input type="range" id="f-${f.field_key}" min="${min}" max="${max}" step="${step}" value="${mid}" oninput="onRangeInput('${f.field_key}', this.value, ${min}, ${max}, '${suf}')">
            <span class="range-val" id="rv-${f.field_key}">${mid}${suf}</span>
          </div>
        </div>
      </div>`;
    }
    default: return '';
  }
}

function renderSteps(){
  const container = document.getElementById('steps-container');
  container.innerHTML = STEPS.map((fields, i)=>{
    const first = fields[0];
    const isImportanceGroup = fields.every(f=>f.field_type==='importance');
    const body = isImportanceGroup
      ? `<div class="imp">${fields.map(f=>fieldTemplate(f)).join('')}</div>`
      : fields.map(f=>fieldTemplate(f)).join('');
    const isLast = i === STEPS.length-1;
    return `<div class="step" id="s${i}">
      ${first.subtitle_fr ? `<div class="sec-eyebrow">${first.subtitle_fr}</div>` : ''}
      <div class="qt">${first.question_fr}</div>
      ${body}
      <div class="em" id="em${i}"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg><span>Veuillez répondre aux questions obligatoires pour continuer.</span></div>
      <div class="btns">
        ${i>0 ? `<button class="btn-back" onclick="go(${i-1})"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg> Retour</button>` : ''}
        ${isLast
          ? `<button class="btn-next" id="btn-submit" onclick="submitSurvey()"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg> Envoyer</button>`
          : `<button class="btn-next" onclick="go(${i+1})">Suivant <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>`}
      </div>
      <div class="dots" id="dots${i}"></div>
    </div>`;
  }).join('');

  for(let i=0;i<STEPS.length;i++){
    const dc = document.getElementById('dots'+i);
    let html='';
    for(let j=0;j<STEPS.length;j++) html += `<div class="dot${j===i?' on':''}" id="d${i}_${j}"></div>`;
    dc.innerHTML = html;
  }
}

function pickOpt(el, key, type){
  const group = el.parentElement;
  if(type==='radio'){
    group.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    el.classList.add('sel');
    S[key] = el.getAttribute('data-v');
  } else {
    el.classList.toggle('sel');
    const vals = [];
    group.querySelectorAll('.opt.sel').forEach(o=>vals.push(o.getAttribute('data-v')));
    S[key] = vals.join(', ');
  }
}
function updCount(key){
  const el = document.getElementById('cnt-'+key);
  if(el) el.textContent = (S[key]||'').length;
}
function onRangeInput(key, v, min, max, suf){
  const n = Number(v);
  S[key] = String(n);
  document.getElementById('rv-'+key).textContent = n.toLocaleString() + suf;
  const pct = Math.round(((n-min)/(max-min))*100);
  document.getElementById('f-'+key).style.background = `linear-gradient(to right,var(--brand) 0%,var(--brand) ${pct}%,var(--border) ${pct}%,var(--border) 100%)`;
}

function go(n, silent){
  if(!silent && n > cur){
    const fields = STEPS[cur];
    const missing = fields.some(f=>f.required && !S[f.field_key]);
    document.getElementById('em'+cur).className = 'em' + (missing?' vis':'');
    if(missing) return;
  }
  document.getElementById('s'+cur)?.classList.remove('on');
  cur = n;
  document.getElementById('s'+cur)?.classList.add('on');
  document.getElementById('cur-n').textContent = cur+1;
  const pct = Math.round(((cur+1)/TOTAL)*100);
  document.getElementById('fill').style.width = pct+'%';
  window.scrollTo({top:0, behavior:'smooth'});
}

function resetStep(){
  const step = document.getElementById('s'+cur);
  if(!step) return;
  step.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  step.querySelectorAll('.fld').forEach(f=>{ f.tagName==='SELECT' ? (f.selectedIndex=0) : (f.value=''); });
  STEPS[cur].forEach(f=>{ delete S[f.field_key]; });
}

async function submitSurvey(){
  const fields = STEPS[cur];
  const missing = fields.some(f=>f.required && !S[f.field_key]);
  document.getElementById('em'+cur).className = 'em' + (missing?' vis':'');
  if(missing) return;

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Envoi en cours…';

  const payload = { status:'new', submitted_at: new Date().toISOString(), responses_data: {...S} };
  Object.keys(S).forEach(k=>{ if(KNOWN_COLUMNS.has(k)) payload[k] = S[k]; });
  if(S.contact_name) payload.client_name = S.contact_name;

  try{
    const { error } = await sb.from('survey_responses').insert([payload]);
    if(error) throw error;
    document.getElementById('s'+cur).classList.remove('on');
    document.getElementById('ty').className = 'ty vis';
    document.getElementById('fill').style.width = '100%';
    window.scrollTo({top:0, behavior:'smooth'});
  }catch(ex){
    console.error(ex);
    const em = document.getElementById('em'+cur);
    em.className = 'em vis';
    em.querySelector('span').textContent = "Une erreur est survenue. Merci de réessayer ou d'écrire directement à Patrick.";
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg> Envoyer';
  }
}

function restart(){
  S = { status:'new' };
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  document.querySelectorAll('.fld').forEach(f=>{ f.tagName==='SELECT' ? (f.selectedIndex=0) : (f.value=''); });
  document.getElementById('ty').className = 'ty';
  cur = 0;
  document.getElementById('s0').classList.add('on');
  document.getElementById('cur-n').textContent = '1';
  document.getElementById('fill').style.width = Math.round((1/TOTAL)*100)+'%';
  window.scrollTo({top:0, behavior:'smooth'});
}

loadSurvey();
</script>
</body>
</html>
